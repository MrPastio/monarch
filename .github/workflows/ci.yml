name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  source:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix oscar/frontend ci --no-audit --no-fund
      - run: npm run typecheck:raw
      - run: npm run test:raw
      - run: npm run upload:dry-run
