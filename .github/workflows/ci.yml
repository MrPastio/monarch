name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  source:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix oscar/frontend ci --no-audit --no-fund
      - run: npm run typecheck:raw
      - name: Run tests
        shell: pwsh
        run: |
          $testTemp = 'C:\monarch-ci-temp'
          $env:MONARCH_CODER_SANDBOX_ROOT = 'C:\monarch-ci-sandbox'
          New-Item -ItemType Directory -Path $testTemp -Force | Out-Null
          $env:TEMP = $testTemp
          $env:TMP = $testTemp
          npm run test:raw -- tests/modules/coder.test.ts tests/app/coder-agent-controller.test.ts --maxWorkers=1
          npm run test:raw -- --exclude tests/modules/coder.test.ts --exclude tests/app/coder-agent-controller.test.ts
      - run: npm run upload:dry-run
